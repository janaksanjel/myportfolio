<html lang="en" data-theme="dark">
<head>

  <meta name="description" content="Janak Sanjel — Full Stack Developer. React, Django, Java. Building production-ready web applications from Kathmandu, Nepal." />
  <title>Janak Sanjel • Full Stack Developer</title>

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23080b10' rx='20'/%3E%3Ctext x='50' y='68' font-family='monospace' font-size='52' font-weight='bold' fill='%2300e5ff' text-anchor='middle'%3EJS%3C/text%3E%3C/svg%3E" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEME TOKENS ── */
[data-theme="dark"] {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1e29;
  --surface3: #222638;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #c4c8d8;
  --muted: #7b8199;
  --user-bubble: #1e2236;
  --shadow: rgba(0,0,0,0.4);
  --code-bg: #0a0c12;
}
[data-theme="light"] {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --surface3: #e6e9f4;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1d2e;
  --text2: #3a3f5c;
  --muted: #8892b0;
  --user-bubble: #e8ecfa;
  --shadow: rgba(0,0,0,0.08);
  --code-bg: #f0f2f8;
}

/* shared tokens */
:root {
  --accent: #6c8cff;
  --accent2: #a78bfa;
  --green: #10b981;
  --amber: #f59e0b;
  --pink: #ec4899;
  --teal: #06b6d4;
  --radius: 16px;
  --radius-sm: 8px;
  --transition: 0.25s ease;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Sora', sans-serif; font-size: 15px; line-height: 1.6;
  overflow: hidden; transition: background var(--transition), color var(--transition);
}

.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 260px; min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: background var(--transition), border-color var(--transition);
}

.sidebar-header { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }

.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.logo-text { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
.logo-sub { font-size: 10px; color: var(--muted); }

.new-chat-btn {
  width: 100%; padding: 8px 12px;
  background: rgba(108,140,255,0.1); border: 1px solid rgba(108,140,255,0.22);
  border-radius: var(--radius-sm); color: var(--accent);
  font-family: 'Sora', sans-serif; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; transition: background 0.2s;
}
.new-chat-btn:hover { background: rgba(108,140,255,0.18); }
.new-chat-btn svg { flex-shrink: 0; }

.sidebar-section {
  padding: 12px 16px 4px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
}

.sidebar-list { list-style: none; padding: 0 8px; overflow-y: auto; flex: 1; }
.sidebar-list li {
  padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer;
  font-size: 12.5px; color: var(--muted); transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-list li:hover { background: var(--surface2); color: var(--text); }
.sidebar-list li.active { background: var(--surface2); color: var(--text); }
.sidebar-list li svg { flex-shrink: 0; opacity: 0.45; }
.sidebar-list li .chat-preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

.sidebar-footer { padding: 10px 14px; border-top: 1px solid var(--border); }
.profile-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.15s;
}
.profile-pill:hover { background: var(--surface2); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, #6c8cff, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.profile-name { font-size: 13px; font-weight: 600; color: var(--text); }
.profile-role { font-size: 11px; color: var(--muted); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.chat-header {
  padding: 14px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg); transition: background var(--transition);
}
.chat-title { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.header-actions { display: flex; gap: 8px; align-items: center; }

/* theme toggle */
.theme-toggle {
  width: 52px; height: 28px; border-radius: 14px;
  background: var(--surface2); border: 1px solid var(--border2);
  cursor: pointer; position: relative; transition: background 0.3s;
  display: flex; align-items: center; padding: 3px;
  flex-shrink: 0;
}
.theme-toggle-knob {
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
[data-theme="dark"] .theme-toggle-knob { transform: translateX(0); }
[data-theme="light"] .theme-toggle-knob { transform: translateX(24px); }

.icon-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }

/* ── MESSAGES ── */
.messages { flex: 1; overflow-y: auto; padding: 28px 0; scroll-behavior: smooth; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.msg-wrap {
  max-width: 760px; margin: 0 auto 26px; padding: 0 22px;
  opacity: 0; transform: translateY(10px);
  animation: fadeUp 0.35s ease forwards;
}
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

.msg-wrap.user { display: flex; justify-content: flex-end; }
.msg-wrap.ai { display: flex; gap: 12px; align-items: flex-start; }

.ai-avatar {
  width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; margin-top: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff; font-weight: 700; font-family: 'JetBrains Mono', monospace;
}
.bubble-user {
  background: var(--user-bubble); border: 1px solid var(--border2);
  border-radius: 16px 16px 4px 16px; padding: 11px 15px;
  font-size: 14px; max-width: 78%; color: var(--text);
  transition: background var(--transition);
}
.bubble-ai { flex: 1; min-width: 0; }
.ai-name { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }
.ai-text { font-size: 14.5px; color: var(--text); line-height: 1.75; }
.ai-text p { margin-bottom: 12px; }
.ai-text p:last-child { margin-bottom: 0; }
.ai-text strong { color: var(--text); font-weight: 600; }

/* typing */
.typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

/* ── CARDS ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-top: 14px; }
.info-card {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 13px;
  transition: border-color 0.2s, background var(--transition);
}
.info-card:hover { border-color: rgba(108,140,255,0.4); }
.card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.card-value { font-size: 14px; font-weight: 600; color: var(--text); }
.card-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag { padding: 3px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 500; border: 1px solid; }
.tag-blue  { background: rgba(108,140,255,0.1); color: #8daeff; border-color: rgba(108,140,255,0.25); }
.tag-purple{ background: rgba(167,139,250,0.1); color: #c4abff; border-color: rgba(167,139,250,0.25); }
.tag-green { background: rgba(16,185,129,0.1);  color: #34d399; border-color: rgba(16,185,129,0.25); }
.tag-amber { background: rgba(245,158,11,0.1);  color: #fcd059; border-color: rgba(245,158,11,0.25); }
.tag-pink  { background: rgba(236,72,153,0.1);  color: #f472b6; border-color: rgba(236,72,153,0.25); }
.tag-teal  { background: rgba(6,182,212,0.1);   color: #22d3ee; border-color: rgba(6,182,212,0.25); }

[data-theme="light"] .tag-blue  { color: #3b5bdb; border-color: rgba(59,91,219,0.3); }
[data-theme="light"] .tag-purple{ color: #7048e8; border-color: rgba(112,72,232,0.3); }
[data-theme="light"] .tag-green { color: #0a7a4e; border-color: rgba(10,122,78,0.3); }
[data-theme="light"] .tag-amber { color: #92530b; border-color: rgba(146,83,11,0.3); }
[data-theme="light"] .tag-pink  { color: #a01b5a; border-color: rgba(160,27,90,0.3); }
[data-theme="light"] .tag-teal  { color: #0874a6; border-color: rgba(8,116,166,0.3); }

.stat-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center; flex: 1; min-width: 85px; transition: background var(--transition); }
.stat-num { font-size: 22px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

.project-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-top: 10px;
  transition: border-color 0.2s, transform 0.2s, background var(--transition);
}
.project-card:hover { border-color: rgba(108,140,255,0.35); transform: translateY(-1px); }
.project-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.project-badge { font-size: 10px; padding: 2px 8px; border-radius: 100px; background: rgba(108,140,255,0.12); color: var(--accent); border: 1px solid rgba(108,140,255,0.2); white-space: nowrap; }
.project-desc { font-size: 13px; color: var(--muted); line-height: 1.55; }

.code-block {
  background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
  line-height: 1.65; margin-top: 10px; overflow-x: auto; color: var(--text2);
  transition: background var(--transition);
}
.code-block .k { color: var(--accent2); }
.code-block .s { color: var(--green); }
.code-block .n { color: var(--accent); }
.code-block .c { color: var(--muted); font-style: italic; }

.contact-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.contact-chip {
  display: flex; align-items: center; gap: 7px; padding: 7px 12px;
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px;
  font-size: 13px; color: var(--text); text-decoration: none; transition: all 0.15s;
}
.contact-chip:hover { border-color: var(--accent); color: var(--accent); }

/* ── WELCOME ── */
.welcome {
  max-width: 640px; margin: 50px auto 0; padding: 0 22px; text-align: center;
  opacity: 0; animation: fadeUp 0.6s 0.2s ease forwards;
}
.welcome-avatar {
  width: 66px; height: 66px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace;
  margin: 0 auto 18px; box-shadow: 0 8px 28px rgba(108,140,255,0.28);
}
.welcome h1 { font-size: 25px; font-weight: 700; margin-bottom: 9px; color: var(--text); }
.welcome h1 span { color: var(--accent); }
.welcome p { font-size: 14.5px; color: var(--muted); max-width: 400px; margin: 0 auto 24px; }
.welcome-cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; text-align: left; }
.welcome-card {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 12px;
  padding: 14px 15px; cursor: pointer; transition: all 0.2s;
}
.welcome-card:hover { border-color: rgba(108,140,255,0.4); background: var(--surface2); transform: translateY(-2px); }
.welcome-card-icon { font-size: 18px; margin-bottom: 7px; }
.welcome-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.welcome-card-desc { font-size: 12px; color: var(--muted); }

/* ── INPUT AREA ── */
.input-area {
  padding: 14px 22px 20px; background: var(--bg);
  border-top: 1px solid var(--border); transition: background var(--transition);
}
.input-wrap { max-width: 760px; margin: 0 auto; }
.suggestions { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 9px; }
.suggest-btn {
  padding: 5px 11px; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 100px; color: var(--muted); font-family: 'Sora', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.suggest-btn:hover { background: var(--surface2); color: var(--text); border-color: rgba(108,140,255,0.3); }
.input-box {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; padding: 11px 13px; transition: border-color 0.2s, background var(--transition);
}
.input-box:focus-within { border-color: rgba(108,140,255,0.45); }
textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Sora', sans-serif; font-size: 14px;
  resize: none; line-height: 1.5; max-height: 120px; min-height: 22px;
}
textarea::placeholder { color: var(--muted); }
.send-btn {
  width: 34px; height: 34px; flex-shrink: 0; background: var(--accent);
  border: none; border-radius: 9px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.15s; color: #fff;
}
.send-btn:hover { background: #5a7aff; transform: scale(1.05); }
.send-btn:disabled { background: var(--border2); cursor: not-allowed; transform: none; }
.input-footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 7px; }
.input-footer a { color: var(--accent); text-decoration: none; }

* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">JS</div>
        <div>
          <div class="logo-text">JanakAI</div>
          <div class="logo-sub">Portfolio Assistant</div>
        </div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Conversation
      </button>
    </div>

    <div class="sidebar-section">Recent</div>
    <ul class="sidebar-list" id="sidebarList"></ul>

    <div class="sidebar-footer">
      <div class="profile-pill">
        <div class="avatar">JS</div>
        <div>
          <div class="profile-name">Janak Sanjel</div>
          <div class="profile-role">Full Stack Developer</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="chat-header">
      <div class="chat-title">
        <div class="status-dot"></div>
        <span id="chatHeaderTitle">Janak Sanjel — Portfolio</span>
      </div>
      <div class="header-actions">
        <!-- theme toggle -->
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
          <div class="theme-toggle-knob" id="themeKnob">🌙</div>
        </button>
        <button class="icon-btn" title="GitHub" onclick="window.open('https://github.com/janaksanjel','_blank')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </button>
        <button class="icon-btn" title="Website" onclick="window.open('https://janaksanjel.com.np','_blank')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-wrap">
        <div class="suggestions" id="suggestions">
          <button class="suggest-btn" onclick="ask('Who is Janak Sanjel?')">Who is Janak?</button>
          <button class="suggest-btn" onclick="ask('Show me his projects')">Projects</button>
          <button class="suggest-btn" onclick="ask('What are his skills?')">Skills</button>
          <button class="suggest-btn" onclick="ask('His work experience')">Experience</button>
          <button class="suggest-btn" onclick="ask('How to contact him?')">Contact</button>
          <button class="suggest-btn" onclick="ask('Tell me about his education')">Education</button>
        </div>
        <div class="input-box">
          <textarea id="input" placeholder="Ask me anything about Janak..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

/* ──────────────────────────────────────────
   THEME
────────────────────────────────────────── */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeKnob').textContent = isDark ? '☀️' : '🌙';
}

/* ──────────────────────────────────────────
   RESPONSE MATCHING
────────────────────────────────────────── */
function getResponseData(input) {
  const q = input.toLowerCase();
  for (const [key, val] of Object.entries(responses)) {
    if (key === 'default') continue;
    if (val.trigger.some(t => q.includes(t))) return val;
  }
  return responses.default;
}

/* ──────────────────────────────────────────
   SIDEBAR / HISTORY
────────────────────────────────────────── */
function renderSidebar() {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  conversations.forEach(conv => {
    const li = document.createElement('li');
    li.className = conv.id === currentChatId ? 'active' : '';
    li.dataset.id = conv.id;
    li.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="chat-preview">${escHtml(conv.title)}</span>`;
    li.addEventListener('click', () => loadConversation(conv.id));
    list.appendChild(li);
  });
}

function loadConversation(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentChatId = id;

  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('chatHeaderTitle').textContent = conv.title;

  conv.messages.forEach(m => {
    appendMsgDOM(m.role, m.html, false);
  });
  msgs.scrollTop = msgs.scrollHeight;
  renderSidebar();
}

function createConversation(title) {
  const id = Date.now().toString();
  conversations.unshift({ id, title, messages: [] });
  currentChatId = id;
  renderSidebar();
  return id;
}

function saveMessage(role, html, text) {
  const conv = conversations.find(c => c.id === currentChatId);
  if (conv) conv.messages.push({ role, html, text });
}

/* ──────────────────────────────────────────
   MESSAGES DOM
────────────────────────────────────────── */
function appendMsgDOM(role, html, animate = true) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  if (!animate) wrap.style.animation = 'none', wrap.style.opacity = '1', wrap.style.transform = 'none';

  if (role === 'user') {
    wrap.innerHTML = `<div class="bubble-user">${html}</div>`;
  } else {
    wrap.innerHTML = `
      <div class="ai-avatar">JS</div>
      <div class="bubble-ai">
        <div class="ai-name">Janak Sanjel</div>
        <div>${html}</div>
      </div>`;
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ai'; wrap.id = 'typing';
  wrap.innerHTML = `
    <div class="ai-avatar">JS</div>
    <div class="bubble-ai">
      <div class="ai-name">Janak Sanjel</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

/* ──────────────────────────────────────────
   SEND
────────────────────────────────────────── */
function ask(q) { if(isTyping) return; document.getElementById('input').value = q; sendMessage(); }

async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('input');
  const q = input.value.trim();
  if (!q) return;

  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  // hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  document.getElementById('suggestions').style.display = 'none';

  // If no active chat, create one
  const respData = getResponseData(q);
  if (!currentChatId) {
    createConversation(respData.title || q.slice(0, 36));
  }

  const userHtml = escHtml(q);
  appendMsgDOM('user', userHtml);
  saveMessage('user', userHtml, q);
  input.value = ''; input.style.height = 'auto';

  showTyping();
  await delay(650 + Math.random() * 450);
  removeTyping();

  const aiHtml = respData.render();
  appendMsgDOM('ai', aiHtml);
  saveMessage('ai', aiHtml, '');

  // update sidebar title to first user question if default
  const conv = conversations.find(c => c.id === currentChatId);
  if (conv && conv.messages.filter(m=>m.role==='user').length === 1) {
    conv.title = respData.title || q.slice(0, 36);
    document.getElementById('chatHeaderTitle').textContent = conv.title;
  }
  renderSidebar();

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ──────────────────────────────────────────
   INIT — auto-type on load
────────────────────────────────────────── */
window.addEventListener('load', async () => {
  showWelcome();
  await delay(1100);
  const input = document.getElementById('input');
  const text = 'Who is Janak Sanjel?';
  for (let i = 0; i <= text.length; i++) {
    input.value = text.slice(0, i);
    await delay(55 + Math.random() * 35);
  }
  await delay(480);
  sendMessage();
});
</script>
