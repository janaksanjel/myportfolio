    education: { trigger: ['education','degree','bca','college','cgpa','academic','study','school'], title: 'Education', render: () => `<div class="glass-card"><strong>🎓 Bachelor of Computer Application (BCA)</strong><br/>Jana Bhawana Campus, Chapagaun · Completed 2025 · CGPA 3.19<br/><strong>📘 +2 Science</strong><br/>Advance Academy College · Passed 2077 BS · GPA 2.97<br/><strong>🏫 School Leaving Certificate (SLC)</strong><br/>Bidhyadhishwari Secondary School · Passed 2073 BS · GPA 3.15</div><div class="ai-text" style="margin-top:10px;">📚 Strong foundation in computer science, algorithms, web technologies & database management — balanced with real-world project experience.</div>` },
    contact: { trigger: ['contact','email','phone','reach','hire','github','website','social','connect'], title: 'Connect with Janak', render: () => `<div class="contact-row"><a href="mailto:janaksanjel12@gmail.com" class="contact-chip">📧 janaksanjel12@gmail.com</a><a href="tel:+9779840748285" class="contact-chip">📞 +977 984 074 8285</a><a href="https://github.com/janaksanjel" target="_blank" class="contact-chip">🐙 github.com/janaksanjel</a><a href="https://www.janak.info.np/" target="_blank" class="contact-chip">🌐 janak.info.np</a><a href="#" class="contact-chip">📍 Godawari-11, Lalitpur, Nepal</a></div><div class="ai-text" style="margin-top:14px;"><p>💬 Best way to reach me is email — I typically reply within 24 hours. Open to freelance, full-time roles, and tech collaborations!</p></div>` },
    default: { title: 'Assistant', render: () => `<div class="ai-text"><p>Hi! I'm Janak's AI portfolio assistant, trained on his complete CV. I can tell you about his <strong>background, professional experience, projects, technical skills, education, or contact info</strong>.</p><p>Try asking: "Who is Janak?", "Show me his projects", "What are his skills?" or "Tell me about his work experience".</p><div class="tag-list"><span class="tag">💼 Experience</span><span class="tag">🚀 Projects</span><span class="tag">⚡ Skills</span><span class="tag">📚 Education</span><span class="tag">📬 Contact</span></div></div>` }
  };

  // ---------- STATE ----------
  let conversations = [];
  let currentChatId = null;
  let isTyping = false;

  // suggestion list for autocomplete
  const suggestionPhrases = ["Who is Janak Sanjel?", "Show me his projects", "What are his skills?", "His work experience", "How to contact him?", "Tell me about his education", "What technologies does he use?", "What is his current role?"];

  // helpers
  const escHtml = s => s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  const delay = ms => new Promise(r => setTimeout(r, ms));
  const autoResize = (el) => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };

  function getResponseData(input) {
    if (containsBadWord(input)) return { render: humanLikeResponseForBadWord, title: "Respectful response" };
    const q = input.toLowerCase();
    for (let key of Object.keys(responses)) {
      if (key !== 'default' && responses[key].trigger.some(t => q.includes(t))) return responses[key];
    }
    return responses.default;
  }

  // DOM message functions
  function appendMsgDOM(role, html, animate = true) {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    if (!animate) wrap.style.animation = 'none';
    if (role === 'user') wrap.innerHTML = `<div class="bubble-user">${html}</div>`;
    else wrap.innerHTML = `<div class="ai-avatar">JS</div><div class="bubble-ai"><div class="ai-name">Janak Sanjel</div><div>${html}</div></div>`;
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  async function showRealisticTyping(aiHtml, callback) {
    const container = document.getElementById('messages');
    const typingDiv = document.createElement('div'); typingDiv.className = 'msg-wrap ai'; typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `<div class="ai-avatar">JS</div><div class="bubble-ai"><div class="ai-name">Janak Sanjel</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    container.appendChild(typingDiv); container.scrollTop = container.scrollHeight;
    await delay(600 + Math.random() * 400);
    removeTyping();
    appendMsgDOM('ai', aiHtml);
    callback();
  }
  function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

  // Storage
  function persist() { localStorage.setItem('janak_cv_chats_v2', JSON.stringify(conversations)); }
  function loadStorage() { const stored = localStorage.getItem('janak_cv_chats_v2'); if(stored) { conversations = JSON.parse(stored); return true; } return false; }

  function saveMessage(role, html, text) {
    const conv = conversations.find(c => c.id === currentChatId);
    if (conv) { conv.messages.push({ role, html, text }); persist(); }
  }

  function renderSidebar() {
    const list = document.getElementById('sidebarList');
    list.innerHTML = '';
    conversations.forEach(conv => {
      const li = document.createElement('li');
      li.className = conv.id === currentChatId ? 'active' : '';
      li.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="chat-preview">${escHtml(conv.title)}</span><button class="delete-chat" data-id="${conv.id}">✕</button>`;
      li.querySelector('.delete-chat').addEventListener('click', (e) => { e.stopPropagation(); deleteConversation(conv.id); });
      li.addEventListener('click', () => loadConversation(conv.id));
      list.appendChild(li);
    });
  }

  function loadConversation(id) {
    const conv = conversations.find(c => c.id === id);
    if (!conv) return;
    currentChatId = id;
    const msgsDiv = document.getElementById('messages');
    msgsDiv.innerHTML = '';
    conv.messages.forEach(m => appendMsgDOM(m.role, m.html, false));
    document.getElementById('chatHeaderTitle').textContent = conv.title;
    document.getElementById('suggestions').style.display = 'flex';
    if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
    renderSidebar();
  }

  function deleteConversation(id) {
    conversations = conversations.filter(c => c.id !== id);
    if (currentChatId === id) { currentChatId = null; showWelcomeScreen(); }
    persist();
    renderSidebar();
  }

  function showWelcomeScreen() {
    document.getElementById('messages').innerHTML = `<div class="welcome"><div class="welcome-avatar">JS</div><h1>Hi, I'm <span style="color:var(--accent)">Janak Sanjel</span> 👋</h1><p>Full Stack Developer from Nepal. Ask me anything about my career, projects, skills — I respond like a real human.</p><div class="welcome-cards"><div class="welcome-card" data-question="Who is Janak Sanjel?"><div>🧑‍💻</div><strong>Who is Janak?</strong><div style="font-size:12px;">Full profile & summary</div></div><div class="welcome-card" data-question="Show me his projects"><div>🚀</div><strong>Projects</strong><div style="font-size:12px;">8+ production apps</div></div><div class="welcome-card" data-question="What are his skills?"><div>⚡</div><strong>Technical skills</strong><div style="font-size:12px;">React, Django, Java, etc.</div></div><div class="welcome-card" data-question="His work experience"><div>💼</div><strong>Experience</strong><div style="font-size:12px;">NIRC & client work</div></div><div class="welcome-card" data-question="How to contact him?"><div>📬</div><strong>Contact</strong><div style="font-size:12px;">Let's connect</div></div><div class="welcome-card" data-question="Tell me about his education"><div>🎓</div><strong>Education</strong><div style="font-size:12px;">BCA, +2, SLC</div></div></div></div>`;
    document.querySelectorAll('.welcome-card').forEach(card => { card.addEventListener('click', () => { sendMessageWithText(card.getAttribute('data-question')); }); });
    document.getElementById('suggestions').style.display = 'flex';
    document.getElementById('chatHeaderTitle').textContent = 'Janak Sanjel · CV AI';
    currentChatId = null;
    renderSidebar();
  }

  async function sendMessageWithText(userText) {
    if (isTyping) return;
    const inputField = document.getElementById('input');
    inputField.value = userText;
    await sendMessage();
  }

  async function sendMessage() {
    if (isTyping) return;
    const input = document.getElementById('input');
    const q = input.value.trim();
    if (!q) return;
    isTyping = true;
    document.getElementById('sendBtn').disabled = true;
    if (document.querySelector('.welcome')) document.querySelector('.welcome').remove();
    document.getElementById('suggestions').style.display = 'none';
    document.getElementById('suggestionDropdown').style.display = 'none';

    const respData = getResponseData(q);
    if (!currentChatId) {
      const newId = Date.now().toString();
      conversations.unshift({ id: newId, title: respData.title || q.slice(0, 32), messages: [] });
      currentChatId = newId;
      persist();
      renderSidebar();
    }
    const userHtml = escHtml(q);
    appendMsgDOM('user', userHtml);
    saveMessage('user', userHtml, q);
    input.value = ''; input.style.height = 'auto';
    const aiHtml = respData.render();
    await showRealisticTyping(aiHtml, () => { saveMessage('ai', aiHtml, ''); });
    const conv = conversations.find(c => c.id === currentChatId);
    if (conv && conv.messages.filter(m => m.role === 'user').length === 1) {
      conv.title = respData.title || q.slice(0, 32);
      document.getElementById('chatHeaderTitle').textContent = conv.title;
      persist();
      renderSidebar();
    }
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // Autocomplete with Tab key
  function setupAutocomplete() {
    const textarea = document.getElementById('input');
    const dropdown = document.getElementById('suggestionDropdown');
    textarea.addEventListener('input', function() {
      const val = this.value.toLowerCase();
      if (val.length === 0) { dropdown.style.display = 'none'; return; }
      const matches = suggestionPhrases.filter(phrase => phrase.toLowerCase().includes(val));
      if (matches.length === 0) { dropdown.style.display = 'none'; return; }
      dropdown.innerHTML = matches.map(m => `<div class="suggestion-item">${escHtml(m)}</div>`).join('');
      dropdown.style.display = 'block';
      document.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', () => { textarea.value = item.textContent; dropdown.style.display = 'none'; textarea.focus(); autoResize(textarea); });
      });
    });
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (dropdown.style.display === 'block' && dropdown.children.length > 0) {
          textarea.value = dropdown.children[0].textContent;
          dropdown.style.display = 'none';
          autoResize(textarea);
        }
      }
    });
    document.addEventListener('click', (e) => { if (!textarea.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none'; });
  }

  // Theme + floating button
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    updateFloatingIcon();
  }
  function updateFloatingIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const btn = document.getElementById('floatingThemeToggle');
    if (btn) btn.textContent = isDark ? '🌙' : '☀️';
  }

  function init() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    updateFloatingIcon();
    if (!loadStorage() || conversations.length === 0) showWelcomeScreen();
    else loadConversation(conversations[0].id);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('input').addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    document.getElementById('input').addEventListener('input', function() { autoResize(this); });
    document.getElementById('newChatBtn').addEventListener('click', () => { currentChatId = null; showWelcomeScreen(); });
    document.querySelectorAll('.suggest-btn').forEach(btn => { btn.addEventListener('click', () => sendMessageWithText(btn.getAttribute('data-ask'))); });
    document.getElementById('menuToggle').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); });
    document.getElementById('overlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); });
    document.getElementById('floatingThemeToggle').addEventListener('click', toggleTheme);
    setupAutocomplete();
  }
  window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
