<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --r-card:20px;--r-sm:12px;--r-pill:40px;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --trans:all 0.22s var(--ease);
}
[data-theme="dark"]{
  --bg:hsl(224,18%,7%);
  --surface:hsl(226,16%,10%);
  --surface2:hsl(228,14%,13%);
  --surface3:hsl(228,13%,17%);
  --border:rgba(255,255,255,0.06);
  --border-hi:rgba(255,255,255,0.12);
  --text:hsl(220,30%,96%);
  --text2:hsl(220,15%,65%);
  --text3:hsl(220,12%,42%);
  --accent:hsl(232,88%,68%);
  --accent2:hsl(260,70%,70%);
  --accent-bg:rgba(91,110,245,0.1);
  --accent-border:rgba(91,110,245,0.25);
  --user-bubble:hsl(228,18%,15%);
  --green:hsl(152,60%,52%);
  --gradient:linear-gradient(135deg,hsl(232,88%,65%),hsl(265,75%,68%));
  --shadow:0 20px 40px rgba(0,0,0,0.4);
  --shadow-sm:0 4px 16px rgba(0,0,0,0.25);
  --invert-logo:0;
}
[data-theme="light"]{
  --bg:hsl(220,20%,97%);
  --surface:hsl(0,0%,100%);
  --surface2:hsl(220,20%,95%);
  --surface3:hsl(220,18%,91%);
  --border:rgba(0,0,0,0.07);
  --border-hi:rgba(0,0,0,0.12);
  --text:hsl(224,25%,10%);
  --text2:hsl(224,12%,40%);
  --text3:hsl(224,10%,60%);
  --accent:hsl(232,82%,58%);
  --accent2:hsl(265,65%,58%);
  --accent-bg:rgba(79,102,235,0.07);
  --accent-border:rgba(79,102,235,0.2);
  --user-bubble:hsl(220,25%,95%);
  --green:hsl(152,60%,38%);
  --gradient:linear-gradient(135deg,hsl(232,82%,58%),hsl(265,65%,62%));
  --shadow:0 8px 30px rgba(0,0,0,0.1);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.06);
  --invert-logo:1;
}

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased;}
.app{display:flex;height:100%;position:relative;}

/* ── SIDEBAR ── */
.sidebar{
  width:270px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  flex-shrink:0;z-index:20;
  transition:transform .3s var(--ease);
}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);box-shadow:24px 0 40px rgba(0,0,0,.3);}
  .sidebar.open{transform:translateX(0);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:19;opacity:0;pointer-events:none;transition:opacity .25s;}
  .overlay.active{opacity:1;pointer-events:auto;}
}
.sb-head{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
.logo-icon{
  width:40px;height:40px;background:var(--gradient);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-weight:500;font-size:17px;color:#fff;
  flex-shrink:0;box-shadow:0 6px 18px rgba(91,110,245,.35);
}
.logo-name{font-weight:600;font-size:16px;letter-spacing:-.3px;}
.logo-role{font-size:11px;color:var(--text3);margin-top:1px;letter-spacing:.02em;}

.new-btn{
  width:100%;background:var(--accent-bg);
  border:1px solid var(--accent-border);
  border-radius:var(--r-pill);padding:9px 14px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;gap:7px;justify-content:center;
  transition:var(--trans);letter-spacing:-.1px;
}
.new-btn:hover{background:rgba(91,110,245,.18);transform:translateY(-1px);}
.new-btn svg{flex-shrink:0;}

.sb-section{padding:18px 18px 6px;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.sb-list{list-style:none;flex:1;overflow-y:auto;padding:0 10px;}
.sb-list li{
  padding:9px 12px;margin-bottom:2px;border-radius:var(--r-sm);
  cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px;
  color:var(--text2);transition:var(--trans);
}
.sb-list li:hover{background:var(--surface2);color:var(--text);}
.sb-list li.active{background:var(--accent-bg);color:var(--accent);border-left:2px solid var(--accent);}
.chat-prev{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.del-btn{
  opacity:0;background:transparent;border:none;cursor:pointer;
  color:var(--text3);border-radius:6px;padding:3px 5px;font-size:13px;
  transition:var(--trans);
}
.sb-list li:hover .del-btn{opacity:1;}
.del-btn:hover{background:rgba(239,68,68,.15);color:#f87171;}

.sb-foot{padding:14px 14px;border-top:1px solid var(--border);}
.profile{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  border-radius:var(--r-sm);background:var(--surface2);
}
.profile-av{
  width:34px;height:34px;background:var(--gradient);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:#fff;flex-shrink:0;
}
.profile-name{font-size:13px;font-weight:500;}
.profile-title{font-size:11px;color:var(--text3);margin-top:1px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}

.chat-header{
  padding:12px 22px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:10;flex-shrink:0;
}
.menu-btn{display:none;background:transparent;border:none;color:var(--text);cursor:pointer;margin-right:10px;padding:4px;}
@media(max-width:768px){.menu-btn{display:flex;}}
.hdr-left{display:flex;align-items:center;}
.hdr-title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px;}
.pulse{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.85);}50%{opacity:1;transform:scale(1.15);}}
.hdr-links{display:flex;gap:8px;}
.hdr-link{
  background:var(--surface2);border:1px solid var(--border-hi);
  border-radius:var(--r-pill);padding:6px 13px;
  font-size:12.5px;font-weight:500;text-decoration:none;color:var(--text2);
  display:inline-flex;align-items:center;gap:5px;transition:var(--trans);
  letter-spacing:-.1px;
}
.hdr-link:hover{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent);}
.theme-btn{
  background:var(--surface2);border:1px solid var(--border-hi);
  border-radius:var(--r-pill);padding:6px 10px;
  font-size:15px;cursor:pointer;transition:var(--trans);
  display:flex;align-items:center;justify-content:center;
}
.theme-btn:hover{border-color:var(--accent-border);background:var(--accent-bg);}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:28px 0 10px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:10px;}

.msg-wrap{max-width:760px;margin:0 auto 22px;padding:0 22px;animation:fadeUp .32s var(--ease) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.msg-wrap.user{display:flex;justify-content:flex-end;}
.msg-wrap.ai{display:flex;gap:12px;}
.ai-av{
  width:34px;height:34px;background:var(--gradient);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  color:#fff;flex-shrink:0;margin-top:2px;
  box-shadow:0 4px 12px rgba(91,110,245,.3);
}
.bubble-user{
  background:var(--user-bubble);border:1px solid var(--border-hi);
  border-radius:20px 20px 5px 20px;padding:11px 17px;
  max-width:72%;font-size:14px;line-height:1.6;
}
.bubble-ai{flex:1;min-width:0;}
.ai-label{font-size:11.5px;font-weight:600;color:var(--accent);margin-bottom:5px;letter-spacing:-.1px;}
.ai-body{font-size:14.5px;line-height:1.7;}
.ai-body p{margin-bottom:10px;}
.ai-body p:last-child{margin-bottom:0;}
.ai-body strong{font-weight:600;color:var(--text);}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:14px;}
.card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-card);padding:14px 16px;
  transition:var(--trans);font-size:13.5px;line-height:1.5;
}
.card:hover{border-color:var(--border-hi);transform:translateY(-2px);background:var(--surface3);}
.card-title{font-weight:600;font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:7px;}
.card-meta{font-size:12px;color:var(--text2);}

/* STATS */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
.stat{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-card);padding:12px 18px;
  flex:1;min-width:80px;text-align:center;transition:var(--trans);
}
.stat:hover{border-color:var(--accent-border);background:var(--accent-bg);}
.stat-n{font-size:26px;font-weight:600;color:var(--accent);font-family:'DM Mono',monospace;letter-spacing:-.5px;}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px;}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.tag{
  padding:3px 11px;border-radius:var(--r-pill);font-size:11.5px;font-weight:500;
  background:var(--accent-bg);color:var(--accent);
  border:1px solid var(--accent-border);letter-spacing:-.1px;
}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.chip{
  background:var(--surface2);border:1px solid var(--border-hi);
  border-radius:var(--r-pill);padding:9px 15px;font-size:13px;
  display:inline-flex;gap:7px;align-items:center;
  text-decoration:none;color:var(--text);transition:var(--trans);
}
.chip:hover{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent);}

/* CODE BLOCK */
.code-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:14px;margin-top:12px;
  font-family:'DM Mono',monospace;font-size:12px;
  line-height:1.7;color:var(--text2);overflow-x:auto;
}
.code-block .kw{color:var(--accent);}
.code-block .str{color:hsl(152,55%,55%);}
.code-block .key{color:var(--accent2);}

/* WELCOME */
.welcome{max-width:680px;margin:28px auto;text-align:center;padding:0 20px;}
.welcome-av{
  width:72px;height:72px;background:var(--gradient);border-radius:24px;
  margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-family:'DM Mono',monospace;font-weight:500;color:#fff;
  box-shadow:0 10px 30px rgba(91,110,245,.35);
}
.welcome h1{font-size:26px;font-weight:600;letter-spacing:-.5px;margin-bottom:8px;}
.welcome p{font-size:14.5px;color:var(--text2);line-height:1.6;max-width:460px;margin:0 auto 28px;}
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:500px){.w-grid{grid-template-columns:repeat(2,1fr);}}
.w-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-card);padding:16px 14px;text-align:left;
  cursor:pointer;transition:var(--trans);
}
.w-card:hover{transform:translateY(-3px);border-color:var(--accent-border);background:var(--accent-bg);}
.w-card-icon{font-size:20px;margin-bottom:8px;}
.w-card-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.w-card-sub{font-size:11.5px;color:var(--text2);}

/* INPUT AREA */
.input-area{padding:14px 22px 24px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.input-wrap{max-width:760px;margin:0 auto;}
.suggestions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.sug-btn{
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--r-pill);padding:5px 13px;font-size:12px;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:var(--trans);color:var(--text2);
}
.sug-btn:hover{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.input-row{
  display:flex;gap:10px;background:var(--surface);
  border:1px solid var(--border-hi);border-radius:24px;
  padding:5px 5px 5px 18px;transition:var(--trans);position:relative;
}
.input-row:focus-within{border-color:var(--accent-border);box-shadow:0 0 0 3px var(--accent-bg);}
textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  resize:none;padding:9px 0;max-height:120px;
  line-height:1.5;
}
textarea::placeholder{color:var(--text3);}
.send-btn{
  background:var(--gradient);border:none;
  border-radius:20px;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--trans);flex-shrink:0;align-self:flex-end;
  box-shadow:0 4px 12px rgba(91,110,245,.3);
}
.send-btn:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(91,110,245,.4);}
.send-btn:disabled{opacity:.45;transform:none;box-shadow:none;cursor:not-allowed;}

/* AUTOCOMPLETE */
.ac-drop{
  position:absolute;bottom:calc(100% + 6px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:16px;max-height:190px;overflow-y:auto;
  z-index:10;box-shadow:var(--shadow-sm);display:none;
}
.ac-item{padding:9px 16px;cursor:pointer;font-size:13px;transition:var(--trans);color:var(--text2);}
.ac-item:hover{background:var(--accent-bg);color:var(--accent);}

/* TYPING */
.typing-dots span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--text3);margin:0 2px;
  animation:dot 1.3s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.18s;}
.typing-dots span:nth-child(3){animation-delay:.36s;}
@keyframes dot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* DIVIDER */
.section-divider{height:1px;background:var(--border);margin:14px 0;}

/* THINKING */
.thinking-msg{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:6px;}
</style>
</head>

const CV_DATA = `

const PHRASES = [
  "Who is Janak Sanjel?","Show me his projects","What are his technical skills?",
  "Tell me about his work experience","How can I contact Janak?","Tell me about his education",
  "What technologies does he use?","What is his current job?","His achievements",
  "Rakmina project","Gym management system","GWP Palika software"
];

let chats = [], currentId = null, busy = false;

const esc = s => s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const sleep = ms => new Promise(r => setTimeout(r, ms));
const resize = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,120)+'px'; };

function save() { localStorage.setItem('jcv3_chats', JSON.stringify(chats)); }
function load() {
  const s = localStorage.getItem('jcv3_chats');
  if (s) { chats = JSON.parse(s); return true; }
  return false;
}

function renderSidebar() {
  const l = document.getElementById('sbList');
  l.innerHTML = '';
  chats.forEach(c => {
    const li = document.createElement('li');
    li.className = c.id === currentId ? 'active' : '';
    li.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="chat-prev">${esc(c.title)}</span><button class="del-btn" data-id="${c.id}" title="Delete">✕</button>`;
    li.querySelector('.del-btn').onclick = e => { e.stopPropagation(); deleteChat(c.id); };
    li.onclick = () => loadChat(c.id);
    l.appendChild(li);
  });
}

function deleteChat(id) {
  chats = chats.filter(c => c.id !== id);
  if (currentId === id) { currentId = null; showWelcome(); }
  save(); renderSidebar();
}

function loadChat(id) {
  const c = chats.find(x => x.id === id);
  if (!c) return;
  currentId = id;
  const m = document.getElementById('messages');
  m.innerHTML = '';
  c.messages.forEach(msg => appendMsg(msg.role, msg.html, false));
  document.getElementById('chatTitle').textContent = c.title;
  document.getElementById('suggestions').style.display = 'flex';
  closeSidebar(); renderSidebar();
}

function closeSidebar() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
  }
}

function appendMsg(role, html, anim = true) {
  const m = document.getElementById('messages');
  const w = document.createElement('div');
  w.className = `msg-wrap ${role}`;
  if (!anim) w.style.animation = 'none';
  if (role === 'user') {
    w.innerHTML = `<div class="bubble-user">${html}</div>`;
  } else {
    w.innerHTML = `<div class="ai-av">JS</div><div class="bubble-ai"><div class="ai-label">Janak Sanjel</div><div class="ai-body">${html}</div></div>`;
  }
  m.appendChild(w);
  m.scrollTop = m.scrollHeight;
}

function showTyping() {
  const m = document.getElementById('messages');
  const w = document.createElement('div');
  w.className = 'msg-wrap ai'; w.id = 'typing';
  w.innerHTML = `<div class="ai-av">JS</div><div class="bubble-ai"><div class="ai-label">Janak Sanjel</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  m.appendChild(w); m.scrollTop = m.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

function saveMsg(role, html) {
  const c = chats.find(x => x.id === currentId);
  if (c) { c.messages.push({role, html}); save(); }
}

async function callClaude(userMessage, history) {
  const messages = [];
  history.forEach(m => {
    if (m.role === 'user') messages.push({role:'user', content: m.text || m.html.replace(/<[^>]+>/g,'')});
    else messages.push({role:'assistant', content: m.text || m.html.replace(/<[^>]+>/g,'')});
  });
  messages.push({role:'user', content: userMessage});

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: CV_DATA,
      messages
    })
  });
  if (!resp.ok) throw new Error(`API error ${resp.status}`);
  const data = await resp.json();
  const text = data.content?.filter(b => b.type==='text').map(b => b.text).join('') || '';
  return text;
}

function formatResponse(text) {
  // Convert markdown-ish to HTML
  let html = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:var(--surface2);padding:1px 6px;border-radius:5px;font-family:\'DM Mono\',monospace;font-size:12.5px;">$1</code>');

  const lines = html.split('\n');
  const out = [];
  let inList = false;
  let listItems = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) {
      if (inList) { out.push('<ul style="margin:6px 0 10px 18px;display:flex;flex-direction:column;gap:4px;">'+listItems.map(li=>`<li style="font-size:14px;line-height:1.6;">${li}</li>`).join('')+'</ul>'); inList=false;listItems=[];}
      continue;
    }
    if (line.startsWith('- ') || line.startsWith('• ') || line.match(/^[\d]+\.\s/)) {
      if (!inList) inList = true;
      listItems.push(line.replace(/^[-•]\s/,'').replace(/^\d+\.\s/,''));
    } else {
      if (inList) { out.push('<ul style="margin:6px 0 10px 18px;display:flex;flex-direction:column;gap:4px;">'+listItems.map(li=>`<li style="font-size:14px;line-height:1.6;">${li}</li>`).join('')+'</ul>'); inList=false;listItems=[];}
      out.push(`<p>${line}</p>`);
    }
  }
  if (inList) out.push('<ul style="margin:6px 0 10px 18px;display:flex;flex-direction:column;gap:4px;">'+listItems.map(li=>`<li style="font-size:14px;line-height:1.6;">${li}</li>`).join('')+'</ul>');
  return out.join('') || `<p>${html}</p>`;
}

async function send(q) {
  if (busy || !q.trim()) return;
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('input').value = '';
  document.getElementById('input').style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('acDrop').style.display = 'none';

  // Remove welcome screen
  document.querySelector('.welcome')?.remove();

  // Create chat if needed
  if (!currentId) {
    currentId = Date.now().toString();
    chats.unshift({id:currentId, title: q.slice(0,35)+'…', messages:[]});
    save(); renderSidebar();
  }

  const userHtml = esc(q);
  appendMsg('user', userHtml);
  saveMsg('user', userHtml);
  showTyping();

  try {
    const hist = (chats.find(c=>c.id===currentId)?.messages || []).slice(0,-1);
    await sleep(300 + Math.random()*200);
    const aiText = await callClaude(q, hist);
    removeTyping();
    const aiHtml = formatResponse(aiText);
    appendMsg('ai', aiHtml);
    saveMsg('ai', aiHtml);

    // Update chat title after first exchange
    const c = chats.find(x => x.id === currentId);
    if (c && c.messages.filter(m=>m.role==='user').length === 1) {
      c.title = q.slice(0, 38) + (q.length > 38 ? '…' : '');
      document.getElementById('chatTitle').textContent = c.title;
      save(); renderSidebar();
    }
  } catch(err) {
    removeTyping();
    const errHtml = `<p>Sorry, I couldn't get a response right now. Please try again in a moment.</p><p style="font-size:12px;color:var(--text3);margin-top:6px;">Error: ${esc(err.message)}</p>`;
    appendMsg('ai', errHtml);
    saveMsg('ai', errHtml);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

      <div class="w-grid">

        <div class="w-card" data-q="Show me his projects"><div class="w-card-icon">🚀</div><div class="w-card-title">Projects</div><div class="w-card-sub">8+ production apps</div></div>
        <div class="w-card" data-q="What are his technical skills?"><div class="w-card-icon">⚡</div><div class="w-card-title">Tech Skills</div><div class="w-card-sub">React, Django, Java…</div></div>

        <div class="w-card" data-q="How can I contact Janak?"><div class="w-card-icon">📬</div><div class="w-card-title">Contact</div><div class="w-card-sub">Let's connect</div></div>
        <div class="w-card" data-q="Tell me about his education"><div class="w-card-icon">🎓</div><div class="w-card-title">Education</div><div class="w-card-sub">BCA, +2, SLC</div></div>
      </div>
    </div>`;
  document.querySelectorAll('.w-card').forEach(c => c.onclick = () => send(c.dataset.q));
  document.getElementById('suggestions').style.display = 'flex';

function setupAutocomplete() {
  const inp = document.getElementById('input');
  const drop = document.getElementById('acDrop');
  inp.addEventListener('input', () => {
    const v = inp.value.toLowerCase();
    if (!v) { drop.style.display='none'; return; }
    const m = PHRASES.filter(p => p.toLowerCase().includes(v));
    if (!m.length) { drop.style.display='none'; return; }
    drop.innerHTML = m.slice(0,5).map(p=>`<div class="ac-item">${esc(p)}</div>`).join('');
    drop.style.display = 'block';
    drop.querySelectorAll('.ac-item').forEach(item => {
      item.onclick = () => { inp.value = item.textContent; drop.style.display='none'; resize(inp); inp.focus(); };
    });
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Tab' && drop.style.display === 'block' && drop.children.length) {
      e.preventDefault(); inp.value = drop.children[0].textContent; drop.style.display='none'; resize(inp);
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(inp.value.trim()); }
  });
  document.addEventListener('click', e => { if (!inp.contains(e.target) && !drop.contains(e.target)) drop.style.display='none'; });
}

function initTheme() {
  const saved = localStorage.getItem('jcv3_theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn();
}
function toggleTheme() {
  const d = document.documentElement;
  const now = d.getAttribute('data-theme') === 'dark';
  d.setAttribute('data-theme', now ? 'light' : 'dark');
  localStorage.setItem('jcv3_theme', now ? 'light' : 'dark');
  updateThemeBtn();
}
function updateThemeBtn() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
}

function init() {
  initTheme();
  if (!load() || !chats.length) showWelcome();
  else loadChat(chats[0].id);

  document.getElementById('sendBtn').onclick = () => send(document.getElementById('input').value.trim());
  document.getElementById('input').addEventListener('input', function(){ resize(this); });
  document.getElementById('newChatBtn').onclick = () => { currentId=null; showWelcome(); };
  document.getElementById('themeBtn').onclick = toggleTheme;
  document.getElementById('menuBtn').onclick = () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
  };
  document.getElementById('overlay').onclick = () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
  };
  document.querySelectorAll('.sug-btn').forEach(b => b.onclick = () => send(b.dataset.q));
  setupAutocomplete();
}
document.addEventListener('DOMContentLoaded', init);
