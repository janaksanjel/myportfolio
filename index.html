<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Janak Sanjel — Full Stack Developer AI Portfolio Assistant">
<title>Janak Sanjel · Portfolio AI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%235b6ef5' rx='22'/%3E%3Ctext x='50' y='68' font-family='monospace' font-size='54' font-weight='700' fill='white' text-anchor='middle'%3EJS%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--r:20px;--rsm:12px;--rp:40px;--ease:cubic-bezier(0.22,1,0.36,1);--t:all .22s var(--ease);--sb-w:272px;}
[data-theme="light"]{
  --bg:hsl(220,20%,97%);--s1:hsl(0,0%,100%);--s2:hsl(220,20%,95%);--s3:hsl(220,18%,91%);
  --bd:rgba(0,0,0,0.07);--bdh:rgba(0,0,0,0.13);
  --tx:hsl(224,25%,10%);--tx2:hsl(224,12%,40%);--tx3:hsl(224,10%,60%);
  --ac:hsl(232,82%,58%);--ac2:hsl(265,65%,58%);
  --acbg:rgba(79,102,235,0.07);--acbd:rgba(79,102,235,0.22);
  --ubbl:hsl(220,25%,94%);--grn:hsl(152,60%,38%);
  --grad:linear-gradient(135deg,hsl(232,82%,58%),hsl(265,65%,62%));
  --shd:0 8px 30px rgba(0,0,0,.1);--shdsm:0 2px 8px rgba(0,0,0,.07);
}
[data-theme="dark"]{
  --bg:hsl(224,18%,7%);--s1:hsl(226,16%,10%);--s2:hsl(228,14%,13%);--s3:hsl(228,13%,17%);
  --bd:rgba(255,255,255,0.06);--bdh:rgba(255,255,255,0.12);
  --tx:hsl(220,30%,96%);--tx2:hsl(220,15%,65%);--tx3:hsl(220,12%,42%);
  --ac:hsl(232,88%,68%);--ac2:hsl(260,70%,70%);
  --acbg:rgba(91,110,245,0.1);--acbd:rgba(91,110,245,0.25);
  --ubbl:hsl(228,18%,15%);--grn:hsl(152,60%,52%);
  --grad:linear-gradient(135deg,hsl(232,88%,65%),hsl(265,75%,68%));
  --shd:0 20px 40px rgba(0,0,0,.4);--shdsm:0 4px 16px rgba(0,0,0,.25);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100dvh;overflow:hidden;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased;}
.app{display:flex;height:100%;position:relative;overflow:hidden;}

/* ── SIDEBAR ── */
.sb{
  width:var(--sb-w);background:var(--s1);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:width .28s var(--ease),transform .28s var(--ease);
  overflow:hidden;z-index:20;
}
/* collapsed on desktop */
.sb.collapsed{width:0;border-right:none;}

/* mobile: always slide from left */
@media(max-width:768px){
  .sb{position:fixed;left:0;top:0;height:100%;width:var(--sb-w)!important;transform:translateX(-100%);}
  .sb.open{transform:translateX(0);}
  .sb.collapsed{width:var(--sb-w)!important;transform:translateX(-100%);}
  .sb.open.collapsed{transform:translateX(0);}
}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(5px);z-index:19;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.on{opacity:1;pointer-events:auto;}

.sb-inner{width:var(--sb-w);display:flex;flex-direction:column;height:100%;flex-shrink:0;}
.sb-hd{padding:20px 16px 16px;border-bottom:1px solid var(--bd);}
.logo{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
.logo-ic{width:40px;height:40px;background:var(--grad);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:500;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 6px 18px rgba(91,110,245,.3);}
.logo-nm{font-weight:600;font-size:16px;letter-spacing:-.3px;white-space:nowrap;}
.logo-rl{font-size:11px;color:var(--tx3);margin-top:1px;letter-spacing:.02em;white-space:nowrap;}
.new-btn{width:100%;background:var(--acbg);border:1px solid var(--acbd);border-radius:var(--rp);padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ac);cursor:pointer;display:flex;align-items:center;gap:7px;justify-content:center;transition:var(--t);white-space:nowrap;}
.new-btn:hover{background:rgba(91,110,245,.18);transform:translateY(-1px);}
.sb-sec{padding:18px 18px 6px;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);white-space:nowrap;}
.sb-ul{list-style:none;flex:1;overflow-y:auto;padding:0 10px;}
.sb-ul::-webkit-scrollbar{width:3px;}
.sb-ul::-webkit-scrollbar-thumb{background:var(--bdh);border-radius:10px;}
.sb-ul li{padding:9px 12px;margin-bottom:2px;border-radius:var(--rsm);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px;color:var(--tx2);transition:var(--t);white-space:nowrap;}
.sb-ul li:hover{background:var(--s2);color:var(--tx);}
.sb-ul li.on{background:var(--acbg);color:var(--ac);border-left:2px solid var(--ac);}
.cp{flex:1;overflow:hidden;text-overflow:ellipsis;}
.dbtn{opacity:0;background:transparent;border:none;cursor:pointer;color:var(--tx3);border-radius:6px;padding:3px 5px;font-size:12px;transition:var(--t);flex-shrink:0;}
.sb-ul li:hover .dbtn{opacity:1;}
.dbtn:hover{background:rgba(239,68,68,.15);color:#e53e3e;}
.sb-ft{padding:14px;border-top:1px solid var(--bd);flex-shrink:0;}
.prof{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rsm);background:var(--s2);}
.prof-av{width:34px;height:34px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.prof-nm{font-size:13px;font-weight:500;white-space:nowrap;}
.prof-tl{font-size:11px;color:var(--tx3);margin-top:1px;white-space:nowrap;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;}
.hdr{padding:11px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-shrink:0;gap:10px;}
.hl{display:flex;align-items:center;gap:6px;min-width:0;}
.toggle-sb{background:transparent;border:1px solid var(--bd);border-radius:var(--rsm);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:var(--t);flex-shrink:0;}
.toggle-sb:hover{background:var(--s2);border-color:var(--bdh);color:var(--tx);}
.htl{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px;white-space:nowrap;}
.dot{width:7px;height:7px;background:var(--grn);border-radius:50%;flex-shrink:0;animation:pu 2.2s ease-in-out infinite;}
@keyframes pu{0%,100%{opacity:.5;transform:scale(.85);}50%{opacity:1;transform:scale(1.15);}}
.hlinks{display:flex;gap:7px;align-items:center;flex-shrink:0;}
.hlink{background:var(--s2);border:1px solid var(--bdh);border-radius:var(--rp);padding:6px 12px;font-size:12.5px;font-weight:500;text-decoration:none;color:var(--tx2);display:inline-flex;align-items:center;gap:5px;transition:var(--t);white-space:nowrap;}
.hlink:hover{border-color:var(--acbd);background:var(--acbg);color:var(--ac);}
.thbtn{background:var(--s2);border:1px solid var(--bdh);border-radius:var(--rp);padding:5px 10px;font-size:15px;cursor:pointer;transition:var(--t);line-height:1;}
.thbtn:hover{border-color:var(--acbd);background:var(--acbg);}
@media(max-width:500px){.hlink-cv{display:none;}}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;padding:28px 0 10px;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{width:4px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bdh);border-radius:10px;}
.mw{max-width:760px;margin:0 auto 22px;padding:0 20px;animation:fu .3s var(--ease) both;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.mw.user{display:flex;justify-content:flex-end;}
.mw.ai{display:flex;gap:12px;}
.aav{width:34px;height:34px;background:var(--grad);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#fff;flex-shrink:0;margin-top:2px;box-shadow:0 4px 12px rgba(91,110,245,.25);}
.bbu{background:var(--ubbl);border:1px solid var(--bdh);border-radius:20px 20px 5px 20px;padding:11px 17px;max-width:72%;font-size:14px;line-height:1.6;}
.bai{flex:1;min-width:0;}
.albl{font-size:11.5px;font-weight:600;color:var(--ac);margin-bottom:5px;}
.abody{font-size:14.5px;line-height:1.7;}
.abody p{margin-bottom:10px;}
.abody p:last-child{margin-bottom:0;}
.abody strong{font-weight:600;color:var(--tx);}
.abody a{color:var(--ac);text-decoration:none;}
.abody a:hover{text-decoration:underline;}

/* ── RICH COMPONENTS ── */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:14px;}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;transition:var(--t);font-size:13.5px;line-height:1.55;}
.card:hover{border-color:var(--bdh);transform:translateY(-2px);background:var(--s3);}
.ctit{font-weight:600;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:7px;color:var(--tx);}
.cmeta{font-size:12.5px;color:var(--tx2);line-height:1.5;}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 18px;flex:1;min-width:80px;text-align:center;transition:var(--t);}
.stat:hover{border-color:var(--acbd);background:var(--acbg);}
.sn{font-size:26px;font-weight:600;color:var(--ac);font-family:'DM Mono',monospace;letter-spacing:-.5px;}
.sl{font-size:11px;color:var(--tx2);margin-top:2px;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.tag{padding:3px 11px;border-radius:var(--rp);font-size:11.5px;font-weight:500;background:var(--acbg);color:var(--ac);border:1px solid var(--acbd);}
.tag.green{background:rgba(34,197,94,.08);color:var(--grn);border-color:rgba(34,197,94,.2);}
.tag.purple{background:rgba(139,92,246,.08);color:hsl(265,65%,55%);border-color:rgba(139,92,246,.2);}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.chip{background:var(--s2);border:1px solid var(--bdh);border-radius:var(--rp);padding:9px 15px;font-size:13px;display:inline-flex;gap:7px;align-items:center;text-decoration:none;color:var(--tx);transition:var(--t);}
.chip:hover{border-color:var(--acbd);background:var(--acbg);color:var(--ac);}
.codeb{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rsm);padding:14px 16px;margin-top:12px;font-family:'DM Mono',monospace;font-size:12.5px;line-height:1.8;color:var(--tx2);}
.kw{color:var(--ac);}.str{color:hsl(152,55%,42%);}.key{color:var(--ac2);}
[data-theme="dark"] .str{color:hsl(152,55%,60%);}
.proj-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.proj{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;transition:var(--t);}
.proj:hover{border-color:var(--acbd);transform:translateX(3px);}
.proj-hd{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.proj-nm{font-weight:600;font-size:13.5px;color:var(--tx);}
.badge{background:var(--acbg);color:var(--ac);border:1px solid var(--acbd);border-radius:var(--rp);padding:2px 9px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge.live{background:rgba(34,197,94,.1);color:var(--grn);border-color:rgba(34,197,94,.25);}
.badge.flutter{background:rgba(3,169,244,.1);color:hsl(200,95%,40%);border-color:rgba(3,169,244,.25);}
[data-theme="dark"] .badge.flutter{color:hsl(200,95%,65%);}
.badge.play{background:rgba(34,197,94,.1);color:var(--grn);border-color:rgba(34,197,94,.25);}
.proj-desc{font-size:13px;color:var(--tx2);line-height:1.55;margin-bottom:8px;}
.edu-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.edu{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;}
.edu-deg{font-weight:600;font-size:14px;color:var(--tx);margin-bottom:3px;}
.edu-inst{font-size:13px;color:var(--tx2);}
.edu-meta{font-size:12px;color:var(--ac);margin-top:4px;font-family:'DM Mono',monospace;}

/* ── WELCOME ── */
.welcome{max-width:680px;margin:28px auto;text-align:center;padding:0 20px;}
.wav{width:72px;height:72px;background:var(--grad);border-radius:24px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-family:'DM Mono',monospace;font-weight:500;color:#fff;box-shadow:0 10px 30px rgba(91,110,245,.3);}
.welcome h1{font-size:26px;font-weight:600;letter-spacing:-.5px;margin-bottom:8px;}
.welcome p{font-size:14.5px;color:var(--tx2);line-height:1.6;max-width:460px;margin:0 auto 28px;}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:500px){.wgrid{grid-template-columns:repeat(2,1fr);}}
.wcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px 14px;text-align:left;cursor:pointer;transition:var(--t);}
.wcard:hover{transform:translateY(-3px);border-color:var(--acbd);background:var(--acbg);}
.wci{font-size:20px;margin-bottom:8px;}
.wct{font-size:13px;font-weight:600;margin-bottom:3px;}
.wcs{font-size:11.5px;color:var(--tx2);}

/* ── INPUT ── */
.inp-area{padding:14px 20px 22px;background:var(--bg);border-top:1px solid var(--bd);flex-shrink:0;}
.inp-wrap{max-width:760px;margin:0 auto;}
.sugs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.sb2{background:var(--s1);border:1px solid var(--bdh);border-radius:var(--rp);padding:5px 13px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:var(--t);color:var(--tx2);}
.sb2:hover{background:var(--acbg);border-color:var(--acbd);color:var(--ac);}
.irow{display:flex;gap:10px;background:var(--s1);border:1px solid var(--bdh);border-radius:24px;padding:5px 5px 5px 18px;transition:var(--t);position:relative;}
.irow:focus-within{border-color:var(--acbd);box-shadow:0 0 0 3px var(--acbg);}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;padding:9px 0;max-height:120px;line-height:1.5;}
textarea::placeholder{color:var(--tx3);}
.sndbtn{background:var(--grad);border:none;border-radius:20px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--t);flex-shrink:0;align-self:flex-end;box-shadow:0 4px 12px rgba(91,110,245,.28);}
.sndbtn:hover{transform:scale(1.05);box-shadow:0 6px 18px rgba(91,110,245,.38);}
.sndbtn:disabled{opacity:.4;transform:none;box-shadow:none;cursor:not-allowed;}
.acdrop{position:absolute;bottom:calc(100% + 6px);left:0;right:0;background:var(--s1);border:1px solid var(--bdh);border-radius:16px;max-height:190px;overflow-y:auto;z-index:30;box-shadow:var(--shdsm);display:none;}
.aci{padding:9px 16px;cursor:pointer;font-size:13px;transition:var(--t);color:var(--tx2);}
.aci:hover{background:var(--acbg);color:var(--ac);}

/* ── TYPING ── */
.tdots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--tx3);margin:0 2px;animation:dw 1.3s infinite;}
.tdots span:nth-child(2){animation-delay:.18s;}
.tdots span:nth-child(3){animation-delay:.36s;}
@keyframes dw{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
</style>
</head>
<body>
<div class="app">
  <div class="ov" id="ov"></div>

  <aside class="sb" id="sb">
    <div class="sb-inner">
      <div class="sb-hd">
        <div class="logo">
          <div class="logo-ic">JS</div>
          <div><div class="logo-nm">Janak Sanjel</div><div class="logo-rl">Portfolio Assistant</div></div>
        </div>
        <button class="new-btn" id="newBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New conversation
        </button>
      </div>
      <div class="sb-sec">Recent</div>
      <ul class="sb-ul" id="sbUl"></ul>
      <div class="sb-ft">
        <div class="prof">
          <div class="prof-av">JS</div>
          <div><div class="prof-nm">Janak Sanjel</div><div class="prof-tl">Full Stack Developer</div></div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="hdr">
      <div class="hl">
        <button class="toggle-sb" id="toggleSb" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="htl"><div class="dot"></div><span id="ctitle">Janak Sanjel · AI</span></div>
      </div>
      <div class="hlinks">
        <a href="https://github.com/janaksanjel" target="_blank" class="hlink">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
        <a href="https://www.janak.info.np/" target="_blank" class="hlink hlink-cv">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          My CV
        </a>
        <button class="thbtn" id="thbtn">☀️</button>
      </div>
    </div>

    <div class="msgs" id="msgs"></div>

    <div class="inp-area">
      <div class="inp-wrap">
        <div class="sugs" id="sugs">
          <button class="sb2" data-q="Who is Janak Sanjel?">Who is Janak?</button>
          <button class="sb2" data-q="Show me his projects">Projects</button>
          <button class="sb2" data-q="What are his technical skills?">Skills</button>
          <button class="sb2" data-q="Tell me about his work experience">Experience</button>
          <button class="sb2" data-q="How can I contact Janak?">Contact</button>
          <button class="sb2" data-q="Tell me about his education">Education</button>
        </div>
        <div class="irow">
          <textarea id="inp" placeholder="Ask anything about Janak's career, projects, or skills…" rows="1"></textarea>
          <div class="acdrop" id="acdrop"></div>
          <button class="sndbtn" id="sndbtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

const sleep = ms => new Promise(r => setTimeout(r,ms));

function getResp(q) {
  for(const [,r] of Object.entries(RESPONSES)){
    if(r.match && r.match(q)) return r;
  }
  return RESPONSES.default;
}

function save(){ localStorage.setItem('jcv5_chats',JSON.stringify(chats)); }
function load(){ const s=localStorage.getItem('jcv5_chats'); if(s){chats=JSON.parse(s);return true;} return false; }

// sidebar open/close — works on BOTH desktop and mobile
let sbOpen = true;
function setSb(open) {
  sbOpen = open;
  const sb = document.getElementById('sb');
  const ov = document.getElementById('ov');
  if(window.innerWidth <= 768) {
    // mobile: slide in/out
    sb.classList.remove('collapsed');
    if(open){ sb.classList.add('open'); ov.classList.add('on'); }
    else { sb.classList.remove('open'); ov.classList.remove('on'); }
  } else {
    // desktop: collapse width
    ov.classList.remove('on');
    sb.classList.remove('open');
    if(open){ sb.classList.remove('collapsed'); }
    else { sb.classList.add('collapsed'); }
  }
  localStorage.setItem('jcv5_sb', open ? '1' : '0');
}
function toggleSb(){ setSb(!sbOpen); }

function renderSb() {
  const ul = document.getElementById('sbUl');
  ul.innerHTML = '';
  chats.forEach(c => {
    const li = document.createElement('li');
    li.className = c.id===cid?'on':'';
    li.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="cp">${esc(c.title)}</span><button class="dbtn" data-id="${c.id}">✕</button>`;
    li.querySelector('.dbtn').onclick = e => { e.stopPropagation(); del(c.id); };
    li.onclick = () => loadC(c.id);
    ul.appendChild(li);
  });
}

function del(id) {
  chats = chats.filter(c=>c.id!==id);
  if(cid===id){cid=null;showWelcome();}
  save(); renderSb();
}

function loadC(id) {
  const c = chats.find(x=>x.id===id);
  if(!c) return;
  cid = id;
  const m = document.getElementById('msgs');
  m.innerHTML = '';
  c.messages.forEach(msg => appendMsg(msg.role,msg.html,false));
  document.getElementById('ctitle').textContent = c.title;
  document.getElementById('sugs').style.display = 'flex';
  if(window.innerWidth<=768) setSb(false);
  renderSb();
}

function appendMsg(role,html,anim=true){
  const m = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = `mw ${role}`;
  if(!anim) w.style.animation='none';
  if(role==='user'){
    w.innerHTML = `<div class="bbu">${html}</div>`;
  } else {
    w.innerHTML = `<div class="aav">JS</div><div class="bai"><div class="albl">Janak Sanjel</div><div class="abody">${html}</div></div>`;
  }
  m.appendChild(w);
  m.scrollTop = m.scrollHeight;
}

function showTyping(){
  const m=document.getElementById('msgs');
  const w=document.createElement('div');
  w.className='mw ai';w.id='typ';
  w.innerHTML=`<div class="aav">JS</div><div class="bai"><div class="albl">Janak Sanjel</div><div class="tdots"><span></span><span></span><span></span></div></div>`;
  m.appendChild(w);m.scrollTop=m.scrollHeight;
}
function rmTyping(){ document.getElementById('typ')?.remove(); }

function saveMsg(role,html){
  const c=chats.find(x=>x.id===cid);
  if(c){c.messages.push({role,html});save();}
}

async function send(q){
  if(busy||!q.trim()) return;
  busy=true;
  const inp=document.getElementById('inp');
  const btn=document.getElementById('sndbtn');
  btn.disabled=true;
  inp.value='';inp.style.height='auto';
  document.getElementById('sugs').style.display='none';
  document.getElementById('acdrop').style.display='none';
  document.querySelector('.welcome')?.remove();

  if(!cid){
    cid=Date.now().toString();
    chats.unshift({id:cid,title:q.slice(0,36)+(q.length>36?'…':''),messages:[]});
    save();renderSb();
  }

  const uHtml=esc(q);
  appendMsg('user',uHtml);
  saveMsg('user',uHtml);
  showTyping();

  const resp=getResp(q);
  await sleep(480+Math.random()*380);
  rmTyping();
  const aiHtml=resp.html();
  appendMsg('ai',aiHtml);
  saveMsg('ai',aiHtml);

  const c=chats.find(x=>x.id===cid);
  if(c&&c.messages.filter(m=>m.role==='user').length===1){
    c.title=resp.title||q.slice(0,36);
    document.getElementById('ctitle').textContent=c.title;
    save();renderSb();
  }
  busy=false;btn.disabled=false;inp.focus();
}

function setupAC(){
  const inp=document.getElementById('inp');
  const drop=document.getElementById('acdrop');
  inp.addEventListener('input',()=>{
    const v=inp.value.toLowerCase();
    if(!v){drop.style.display='none';return;}
    const m=PHRASES.filter(p=>p.toLowerCase().includes(v)).slice(0,6);
    if(!m.length){drop.style.display='none';return;}
    drop.innerHTML=m.map(p=>`<div class="aci">${esc(p)}</div>`).join('');
    drop.style.display='block';
    drop.querySelectorAll('.aci').forEach(i=>{
      i.onclick=()=>{inp.value=i.textContent;drop.style.display='none';resize(inp);inp.focus();};
    });
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Tab'&&drop.style.display==='block'&&drop.children.length){
      e.preventDefault();inp.value=drop.children[0].textContent;drop.style.display='none';resize(inp);
    }
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(inp.value.trim());}
  });
  document.addEventListener('click',e=>{if(!inp.contains(e.target)&&!drop.contains(e.target))drop.style.display='none';});
}

function toggleTheme(){
  const d=document.documentElement;
  const light=d.getAttribute('data-theme')==='light';
  d.setAttribute('data-theme',light?'dark':'light');
  localStorage.setItem('jcv5_theme',light?'dark':'light');
  document.getElementById('thbtn').textContent=light?'🌙':'☀️';
}

function init(){
  // theme — default light
  const th=localStorage.getItem('jcv5_theme')||'light';
  document.documentElement.setAttribute('data-theme',th);
  document.getElementById('thbtn').textContent=th==='dark'?'🌙':'☀️';

  // sidebar state — default open
  const sbSaved=localStorage.getItem('jcv5_sb');
  sbOpen = sbSaved===null ? true : sbSaved==='1';
  if(!sbOpen) document.getElementById('sb').classList.add('collapsed');

  if(!load()||!chats.length) showWelcome();
  else loadC(chats[0].id);

  document.getElementById('sndbtn').onclick=()=>send(document.getElementById('inp').value.trim());
  document.getElementById('inp').addEventListener('input',function(){resize(this);});
  document.getElementById('newBtn').onclick=()=>{cid=null;showWelcome();};
  document.getElementById('thbtn').onclick=toggleTheme;
  document.getElementById('toggleSb').onclick=toggleSb;
  document.getElementById('ov').onclick=()=>setSb(false);
  document.querySelectorAll('.sb2').forEach(b=>b.onclick=()=>send(b.dataset.q));
  setupAC();

  // handle resize between mobile/desktop
  window.addEventListener('resize',()=>{
    if(window.innerWidth>768){
      document.getElementById('ov').classList.remove('on');
      document.getElementById('sb').classList.remove('open');
    }
  });
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
